<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"text","type":"string","label":"Text to type","default":"npm install motion"},
    {"id":"color","type":"color","label":"Text color","default":"#f3f4f6"},
    {"id":"cursor","type":"color","label":"Cursor color","default":"#22d3ee"},
    {"id":"bg","type":"color","label":"Background","default":"#050505"},
    {"id":"start","type":"number","label":"Start time seconds","default":0.3,"min":0,"max":5,"step":0.1}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Typewriter Text</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
          background: var(--bg, #050505);
          background-color: var(--bg, #050505);
          font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
          overflow: hidden;
        }
        .terminal {
          font-size: 72px;
          font-weight: 700;
          color: var(--color);
          white-space: pre;
        }
        .cursor {
          display: inline-block;
          width: 14px;
          height: 64px;
          margin-left: 8px;
          background: var(--cursor);
          vertical-align: -8px;
        }
      </style>

      <div id="root" data-composition-id="typewriter-text-block" data-width="1920" data-height="1080">
        <div class="terminal">
          <span id="typed-text"></span><span class="cursor" id="typed-cursor"></span>
        </div>
      </div>

      <script>
        const { text, color, cursor, bg, start } = window.__hyperframes.getVariables();
        const root = document.getElementById("root");
        root.style.setProperty("--bg", bg);
        root.style.setProperty("--color", color);
        root.style.setProperty("--cursor", cursor);

        const textEl = document.getElementById("typed-text");
        const cursorEl = document.getElementById("typed-cursor");
        const fullText = String(text);
        const duration = parseFloat(root.dataset.duration) || 5;
        const typeDuration = fullText.length * 0.07;
        const blinkCycles = Math.max(1, Math.round(duration / 0.7));

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const driver = { len: 0 };
        tl.to(driver, {
          len: fullText.length,
          duration: typeDuration,
          ease: "power1.inOut",
          onUpdate: () => {
            textEl.textContent = fullText.slice(0, Math.floor(driver.len));
          },
        }, start);

        const blink = { p: 0 };
        tl.to(blink, {
          p: Math.PI * 2 * blinkCycles,
          duration,
          ease: "none",
          onUpdate: () => {
            cursorEl.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0";
          },
        }, 0);

        window.__timelines["typewriter-text-block"] = tl;
      </script>
    </template>
  </body>
</html>
