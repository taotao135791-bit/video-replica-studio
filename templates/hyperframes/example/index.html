<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Anti-PPT Motion — HyperFrames Example</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg: #050505;
        --surface: #111111;
        --text: #f3f4f6;
        --text-muted: #9ca3af;
        --accent: #22d3ee;
        --primary: #3b82f6;
        --primary-glow: rgba(59, 130, 246, 0.55);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      /* Scene stage */
      .scene {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      /* World wrapper for camera rig */
      .world {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        transform-origin: 50% 50%;
        will-change: transform;
      }

      /* Kinetic text */
      .kinetic-text {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.35em;
        font-size: 120px;
        font-weight: 900;
        line-height: 1.05;
        color: var(--text);
        perspective: 1000px;
      }
      .phrase {
        display: inline-block;
        transform-origin: 50% 100%;
        white-space: pre;
      }

      /* Glow card */
      .card-stage {
        position: relative;
        perspective: 1200px;
        transform-style: preserve-3d;
      }
      .card {
        position: relative;
        z-index: 2;
        width: 760px;
        padding: 64px;
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        overflow: hidden;
      }
      .card h2 {
        font-size: 72px;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 16px;
      }
      .card p {
        font-size: 28px;
        color: var(--text-muted);
      }
      .card-glow {
        position: absolute;
        z-index: 1;
        inset: -160px;
        background: radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, rgba(0, 0, 0, 0) 65%);
        opacity: 0;
        transform: scale(0.8);
        pointer-events: none;
        will-change: transform, opacity;
      }
      .card-sheen {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 35%;
        z-index: 3;
        background: linear-gradient(
          105deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(255, 255, 255, 0.12) 50%,
          rgba(0, 0, 0, 0) 100%
        );
        opacity: 0;
        pointer-events: none;
        will-change: transform, opacity;
        transform: translateX(-120%);
      }

      /* Cursor */
      .cursor {
        position: absolute;
        left: 160px;
        top: 820px;
        z-index: 999;
        pointer-events: none;
        will-change: transform;
      }
      .ripple {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.6);
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        pointer-events: none;
        z-index: 998;
        will-change: transform, opacity;
      }

      /* Overlays */
      .grain-overlay {
        position: absolute;
        inset: 0;
        z-index: 999;
        pointer-events: none;
        opacity: 0.04;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 256px 256px;
      }
      .vignette-overlay {
        position: absolute;
        inset: 0;
        z-index: 998;
        pointer-events: none;
        background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.55) 100%);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="anti-ppt-example"
      data-width="1920"
      data-height="1080"
      data-duration="6"
      data-start="0"
    >
      <div class="scene clip" id="scene-main" data-start="0" data-duration="6" data-track-index="1">
        <div class="world" id="world" data-layout-allow-overflow>
          <div class="card-stage" id="card-stage" style="display: none;">
            <div class="card-glow" id="card-glow"></div>
            <div class="card" id="card">
              <div class="card-sheen" id="card-sheen"></div>
              <h2>Anti-PPT</h2>
              <p>Motion that refuses to sit still.</p>
            </div>
          </div>

          <div class="kinetic-text" id="kinetic-text"></div>
        </div>

        <div class="cursor" id="cursor" style="opacity: 0;">
          <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M5 3L19 12L12 13L9 20L5 3Z"
              fill="#ffffff"
              stroke="rgba(0,0,0,0.5)"
              stroke-width="1.5"
            />
          </svg>
        </div>
        <div class="ripple" id="ripple"></div>
      </div>

      <div class="vignette-overlay" aria-hidden="true"></div>
      <div class="grain-overlay" aria-hidden="true"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const world = document.getElementById("world");
      const cam = { scale: 1, x: 0, y: 0 };
      function applyCamera() {
        world.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.scale})`;
      }
      applyCamera();

      /* ================================================================
         KINETIC TEXT
         ================================================================ */
      const phrases = ["Ship", "faster", "with", "motion"];
      const kineticStage = document.getElementById("kinetic-text");
      phrases.forEach((text) => {
        const span = document.createElement("span");
        span.className = "phrase";
        span.textContent = text;
        kineticStage.appendChild(span);
      });

      phrases.forEach((_, i) => {
        tl.fromTo(
          kineticStage.children[i],
          { y: 60, opacity: 0, rotateX: -45 },
          { y: 0, opacity: 1, rotateX: 0, duration: 0.55, ease: "back.out(1.6)" },
          0.2 + i * 0.18,
        );
      });

      /* ================================================================
         CAMERA PUSH + GLOW CARD REVEAL
         ================================================================ */
      const cardStage = document.getElementById("card-stage");
      const card = document.getElementById("card");
      const cardGlow = document.getElementById("card-glow");
      const cardSheen = document.getElementById("card-sheen");

      tl.set(cardStage, { display: "grid" }, 1.6);
      tl.set(kineticStage, { opacity: 0 }, 1.6);
      tl.fromTo(
        cardGlow,
        { opacity: 0, scale: 0.8 },
        { opacity: 0.32, scale: 1, duration: 0.9, ease: "power2.out" },
        1.8,
      );
      tl.fromTo(
        card,
        { rotateX: 14, rotateY: -16, scale: 0.9, opacity: 0 },
        { rotateX: 0, rotateY: 0, scale: 1, opacity: 1, duration: 1.0, ease: "power3.out" },
        1.8,
      );

      const cardWidth = 760;
      const sheenWidth = cardWidth * 0.35;
      const travel = cardWidth + sheenWidth * 2;
      tl.fromTo(
        cardSheen,
        { x: -travel * 0.55, opacity: 0 },
        { x: travel * 0.55, opacity: 1, duration: 1.0, ease: "none" },
        2.4,
      );
      tl.to(cardSheen, { opacity: 0, duration: 0.25, ease: "power1.in" }, 3.4);

      // Camera pushes in on the card: counter-translate T = -offset * S
      const targetScale = 1.35;
      const targetX = 0;
      const targetY = -120;
      tl.to(
        cam,
        {
          scale: targetScale,
          x: -targetX * targetScale,
          y: -targetY * targetScale,
          duration: 1.2,
          ease: "power3.inOut",
          onUpdate: applyCamera,
        },
        1.7,
      );

      /* ================================================================
         CURSOR CLICK
         ================================================================ */
      const cursor = document.getElementById("cursor");
      const ripple = document.getElementById("ripple");
      const cardRect = { x: 960, y: 540 }; // screen center where the card sits
      const cursorStartX = 160;
      const cursorStartY = 820;
      const targetCX = cardRect.x - cursorStartX;
      const targetCY = cardRect.y - cursorStartY;
      const cursorIn = 2.0;
      const clickAt = 2.6;

      tl.set(cursor, { opacity: 1 }, cursorIn);
      tl.to(cursor, { x: targetCX, y: targetCY, duration: 0.5, ease: "back.out(1.3)" }, cursorIn);
      tl.to(cursor, { scale: 0.85, duration: 0.08, yoyo: true, repeat: 1 }, clickAt);
      tl.set(ripple, { opacity: 1, x: targetCX, y: targetCY }, clickAt);
      tl.fromTo(
        ripple,
        { scale: 0, opacity: 1 },
        { scale: 5, opacity: 0, duration: 0.7, ease: "power2.out" },
        clickAt,
      );
      tl.to(cursor, { opacity: 0, duration: 0.2 }, clickAt + 0.6);

      window.__timelines["anti-ppt-example"] = tl;
    </script>
  </body>
</html>
