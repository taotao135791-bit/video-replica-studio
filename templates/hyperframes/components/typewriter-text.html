  1. Paste the HTML.
  2. Paste the CSS.
  3. Paste the JS into your main timeline script.

  Props (set via CSS variables or by editing the constants):
    --type-font-size  : text font size (default 72px)
    --type-color      : text color (default #f3f4f6)
    --type-cursor     : cursor color (default #22d3ee)
    --type-cursor-w   : cursor width, px (default 14)
    --type-cursor-h   : cursor height, px (default 64)
    --type-start      : typing start time, seconds (default 0.3)
-->

<!-- HTML -->
<div class="typewriter">
  <span class="typewriter__text" id="typewriter-text"></span><span class="typewriter__cursor" id="typewriter-cursor"></span>
</div>

<!-- CSS -->
<style>
  .typewriter {
    font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
    font-size: var(--type-font-size, 72px);
    font-weight: 700;
    color: var(--type-color, #f3f4f6);
    white-space: pre;
  }
  .typewriter__cursor {
    display: inline-block;
    width: var(--type-cursor-w, 14px);
    height: var(--type-cursor-h, 64px);
    margin-left: 8px;
    background: var(--type-cursor, #22d3ee);
    vertical-align: -8px;
  }
</style>
