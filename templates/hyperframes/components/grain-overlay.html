<!--
  Grain Overlay — paste-in component
  Props (set via CSS variables on the host root or inline style):
    --grain-opacity  : overlay opacity (default 0.04)
    --grain-blend    : mix-blend-mode (default overlay)
    --grain-color    : tint of the noise (default #ffffff)
-->
<style>
  .grain-overlay {
    position: absolute;
    inset: 0;
    z-index: 999;
    pointer-events: none;
    opacity: var(--grain-opacity, 0.04);
    mix-blend-mode: var(--grain-blend, overlay);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
</style>
<div class="grain-overlay" aria-hidden="true"></div>
