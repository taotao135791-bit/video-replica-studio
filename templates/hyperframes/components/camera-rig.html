<!--
  Camera Rig — paste-in component
  Virtual camera that pans/zooms/locks by transforming a single .world wrapper.

  1. Paste the HTML wrapper around your scene content.
  2. Paste the CSS.
  3. Paste the JS into your main timeline script.

  Props (set via CSS variables or by editing the constants):
    --cam-start      : when camera move begins, seconds (default 1.5)
    --cam-duration   : camera move duration, seconds (default 1.2)
    --cam-target-x   : world X offset to focus, px (default 0)
    --cam-target-y   : world Y offset to focus, px (default -200)
    --cam-target-s   : final scale (default 1.4)
-->

<!-- HTML -->
<div class="world" id="world">
  <!-- All scene content goes inside .world -->
</div>

<!-- CSS -->
<style>
  .world {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    transform-origin: 50% 50%;
    will-change: transform;
  }
</style>
