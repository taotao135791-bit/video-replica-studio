  Kinetic Text — paste-in component
  Staggered phrase entrances with transform-only motion.

  1. Paste the HTML.
  2. Paste the CSS.
  3. Paste the JS into your main timeline script.

  Props (set via CSS variables or by editing the PHRASES array):
    --kinetic-font-size : phrase font size (default 120px)
    --kinetic-color     : phrase color (default #f3f4f6)
    --kinetic-stagger   : delay between phrases, seconds (default 0.18)
    --kinetic-start     : first phrase start time, seconds (default 0.2)
    --kinetic-duration  : per-phrase entrance duration, seconds (default 0.55)
-->

<!-- HTML -->
<div class="kinetic-text" id="kinetic-text"></div>

<!-- CSS -->
<style>
  .kinetic-text {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.35em;
    font-size: var(--kinetic-font-size, 120px);
    font-weight: 900;
    line-height: 1.05;
    color: var(--kinetic-color, #f3f4f6);
    perspective: 1000px;
  }
  .kinetic-text__phrase {
    display: inline-block;
    transform-origin: 50% 100%;
    white-space: pre;
  }
</style>
